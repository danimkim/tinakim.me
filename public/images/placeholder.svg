<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a1a"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="166" x2="800" y2="166" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="333" x2="800" y2="333" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="266" y1="0" x2="266" y2="500" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="500" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Center icon: image frame -->
  <rect x="340" y="196" width="120" height="90" rx="8" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>

  <!-- Mountain shape inside frame -->
  <polyline points="352,274 376,240 400,258 424,228 448,274" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" fill="none" stroke-linejoin="round"/>

  <!-- Circle (sun) inside frame -->
  <circle cx="364" cy="218" r="8" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>

  <!-- Label -->
  <text x="400" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#ffffff" fill-opacity="0.2" text-anchor="middle" letter-spacing="3">NO IMAGE</text>
</svg>
